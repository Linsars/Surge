name: NewAPI通用签到
description: 适配所有NewAPI源码搭建的中转站（支持多站点共用同一脚本）。先打开任意中转站App/网页进入个人中心触发 /api/user/self 即可自动抓包保存Cookie。抓取成功后会自动保存，后续定时自动签到。每天早上9:10执行。
author: Linsar（基于原脚本Egern适配）
dns: {}
scriptings:
- http_request:
    name: NewAPI签到获取Headers
    match: ^https:\/\/.*\/api\/user\/self$
    script_url: https://raw.githubusercontent.com/Linsars/Surge/main/JS/egern-newapiSG.js
    timeout: 60
- schedule:
    name: NewAPI签到定时执行
    cron: 10 9 * * *
    script_url: https://raw.githubusercontent.com/Linsars/Surge/main/JS/egern-newapiSG.js
    argument: '{"host":""}'
    timeout: 120
mitm:
  hostnames:
    includes:
    - '*'
    excludes:
    - '*.apple.com'
    - '*.icloud.com'
    - 'testflight.apple.com'
    - 'apps.apple.com'
    - 'itunes.apple.com'
    - 'appstore.com'
    - 'mzstatic.com'
    - 'apple.com'
