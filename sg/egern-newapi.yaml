#!name=NewAPI通用签到（Loon版）
#!desc=适配所有NewAPI中转站，支持多站点。打开App进入个人中心自动抓包保存Cookie，每天9:10自动签到。已排除苹果所有域名，不会影响 App Store / TestFlight / iCloud。
#!author=Linsar
#!date=2026-04-19

[Script]
NewAPI签到获取Headers = type=http-request, pattern=^https:\/\/.*\/api\/user\/self$, script-path=https://raw.githubusercontent.com/Linsars/Surge/main/JS/egern-newapiSG.js, requires-body=false, timeout=60

NewAPI签到定时执行 = type=cron, cronexp=10 9 * * *, script-path=https://raw.githubusercontent.com/Linsars/Surge/main/JS/egern-newapiSG.js, argument={"host":""}, timeout=120

[MITM]
hostname = %APPEND% *,-*.apple.com,-*.icloud.com,-testflight.apple.com,-apps.apple.com,-itunes.apple.com,-appstore.com,-mzstatic.com,-apple.com
